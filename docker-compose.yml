version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart-dining-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_dining
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smart-dining-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
